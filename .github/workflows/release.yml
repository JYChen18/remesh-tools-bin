name: Build and publish wheels

on:
  pull_request:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release:
    name: Verify release metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify tag matches project version
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          expected_tag = f"v{project['version']}"
          release_tag = os.environ["RELEASE_TAG"]
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not match project version; "
                  f"expected {expected_tag!r}"
              )
          PY

  build-wheels:
    name: Build ${{ matrix.target.name }} wheel
    needs: verify-release
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: linux-x86_64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            artifact: linux-arm64
          - name: Windows x86_64
            os: windows-latest
            artifact: windows-x86_64
          - name: macOS Intel
            os: macos-15-intel
            artifact: macos-x86_64
          - name: macOS Apple Silicon
            os: macos-latest
            artifact: macos-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==4.1.0

      - name: Build wheel
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-${{ matrix.target.artifact }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  test-python:
    name: Test Python asset APIs
    needs: verify-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Python test dependencies
        run: python -m pip install pytest "mujoco>=3.9.0" "numpy>=1.26" "trimesh>=4.0"

      - name: Run Python unit tests
        env:
          PYTHONPATH: src
        run: python -m pytest -q tests

  test-wheels:
    name: Test ${{ matrix.target.name }} on Python ${{ matrix.python-version }}
    needs: build-wheels
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        target:
          - name: Windows x86_64
            os: windows-latest
            artifact: windows-x86_64
          - name: macOS Intel
            os: macos-15-intel
            artifact: macos-x86_64
          - name: macOS Apple Silicon
            os: macos-latest
            artifact: macos-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: wheels-${{ matrix.target.artifact }}
          path: wheelhouse

      - name: Install wheel
        shell: bash
        run: "python -m pip install --only-binary=:all: wheelhouse/*.whl"

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Run native smoke tests
        run: python tests/smoke_wheel.py

  test-linux-minimal:
    name: Test ${{ matrix.target.name }} in Python ${{ matrix.python-version }} slim
    needs: build-wheels
    runs-on: ${{ matrix.target.os }}
    container: python:${{ matrix.python-version }}-slim-bookworm
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        target:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: linux-x86_64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            artifact: linux-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: wheels-${{ matrix.target.artifact }}
          path: wheelhouse

      - name: Install wheel without system packages
        shell: bash
        run: "python -m pip install --only-binary=:all: wheelhouse/*.whl"

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Run all native tools
        run: python tests/smoke_wheel.py

  publish-pypi:
    name: Publish wheels to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-wheels
      - test-python
      - test-wheels
      - test-linux-minimal
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sim-asset-tools
    permissions:
      id-token: write # Required for PyPI Trusted Publishing via OpenID Connect.

    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish wheels
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
